<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            font-family: 'Roboto', sans-serif;
        }
        .calculator {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            width: 320px;
        }
        .display {
            background-color: #222;
            color: #0ff;
            font-size: 2em;
            padding: 15px;
            border-radius: 8px;
            text-align: right;
            margin-bottom: 10px;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.1);
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .button {
            background-color: #333;
            border: none;
            border-radius: 8px;
            color: #0ff;
            font-size: 1.5em;
            padding: 15px;
            transition: background-color 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .button:hover {
            background-color: #444;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .button.operator {
            color: #ff4081;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display" class="display">0</div>
        <div class="buttons">
            <button class="button" onclick="clearDisplay()">C</button>
            <button class="button" onclick="appendNumber('/')">/</button>
            <button class="button" onclick="appendNumber('*')">*</button>
            <button class="button operator" onclick="deleteLast()">DEL</button>
            <button class="button" onclick="appendNumber('7')">7</button>
            <button class="button" onclick="appendNumber('8')">8</button>
            <button class="button" onclick="appendNumber('9')">9</button>
            <button class="button operator" onclick="appendNumber('-')">-</button>
            <button class="button" onclick="appendNumber('4')">4</button>
            <button class="button" onclick="appendNumber('5')">5</button>
            <button class="button" onclick="appendNumber('6')">6</button>
            <button class="button operator" onclick="appendNumber('+')">+</button>
            <button class="button" onclick="appendNumber('1')">1</button>
            <button class="button" onclick="appendNumber('2')">2</button>
            <button class="button" onclick="appendNumber('3')">3</button>
            <button class="button" onclick="calculateResult()" style="grid-row: span 2;">=</button>
            <button class="button" onclick="appendNumber('0')">0</button>
            <button class="button" onclick="appendNumber('.')">.</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        let currentInput = '';

        function appendNumber(number) {
            if (currentInput === '0' && number !== '.') currentInput = '';
            currentInput += number;
            display.innerText = currentInput;
        }

        function clearDisplay() {
            currentInput = '';
            display.innerText = '0';
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            display.innerText = currentInput || '0';
        }

        function calculateResult() {
            try {
                currentInput = eval(currentInput).toString();
                display.innerText = currentInput;
            } catch {
                display.innerText = 'Error';
                currentInput = '';
            }
        }
    </script>
</body>
</html>
